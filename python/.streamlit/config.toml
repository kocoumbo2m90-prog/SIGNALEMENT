[theme]
primaryColor = "#667eea"
backgroundColor = "#f5f5f5"
secondaryBackgroundColor = "#e0e0e0"
textColor = "#333333"
font = "sans serif"

[client]
showErrorDetails = true
toolbarMode = "developer"

[logger]
level = "info"

[server]
port = 8501
headless = false
runOnSave = true
enableXsrfProtection = true
maxUploadSize = 500
